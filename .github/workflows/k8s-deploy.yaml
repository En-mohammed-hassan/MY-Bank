name: Build and Deploy to Kubernetes

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_prefix: ${{ steps.registry.outputs.image_prefix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image prefix (GHCR requirement)
        id: registry
        run: echo "image_prefix=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/my-bank" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (core-banking)
        id: meta-core
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.image_prefix }}/core-banking
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push core-banking
        uses: docker/build-push-action@v6
        with:
          context: ./bank simulator
          push: true
          tags: ${{ steps.meta-core.outputs.tags }}
          labels: ${{ steps.meta-core.outputs.labels }}

      - name: Docker metadata (bank-user)
        id: meta-user
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.image_prefix }}/bank-user
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push bank-user
        uses: docker/build-push-action@v6
        with:
          context: ./b-user
          push: true
          tags: ${{ steps.meta-user.outputs.tags }}
          labels: ${{ steps.meta-user.outputs.labels }}

  # Runs on a self-hosted runner installed on the same server as k3s.
  # No KUBE_CONFIG secret or Cloudflare tunnel needed.
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig from k3s
        run: |
          mkdir -p ~/.kube
          sudo cat /etc/rancher/k3s/k3s.yaml > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Patch prod overlay images
        run: |
          IMAGE_PREFIX="${{ needs.build-and-push.outputs.image_prefix }}"
          cd k8s/overlays/prod
          kustomize edit set image \
            ghcr.io/example/my-bank/core-banking=${IMAGE_PREFIX}/core-banking:latest \
            ghcr.io/example/my-bank/bank-user=${IMAGE_PREFIX}/bank-user:latest

      - name: Deploy to cluster
        run: kubectl apply -k k8s/overlays/prod

      - name: Restart deployments to pull latest images
        run: |
          kubectl rollout restart deployment/core-banking deployment/bank-user -n my-bank

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/core-banking -n my-bank --timeout=180s
          kubectl rollout status deployment/bank-user -n my-bank --timeout=180s
