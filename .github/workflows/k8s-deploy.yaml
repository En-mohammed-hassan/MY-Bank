name: Build and Deploy to Kubernetes

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_prefix: ${{ steps.registry.outputs.image_prefix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image prefix (GHCR requirement)
        id: registry
        run: echo "image_prefix=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/my-bank" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (core-banking)
        id: meta-core
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.image_prefix }}/core-banking
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push core-banking
        uses: docker/build-push-action@v6
        with:
          context: ./bank simulator
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta-core.outputs.tags }}
          labels: ${{ steps.meta-core.outputs.labels }}

      - name: Docker metadata (bank-user)
        id: meta-user
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.image_prefix }}/bank-user
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push bank-user
        uses: docker/build-push-action@v6
        with:
          context: ./b-user
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta-user.outputs.tags }}
          labels: ${{ steps.meta-user.outputs.labels }}

      - name: Docker metadata (c-user)
        id: meta-customer
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.image_prefix }}/c-user
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push c-user
        uses: docker/build-push-action@v6
        with:
          context: ./c-user
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta-customer.outputs.tags }}
          labels: ${{ steps.meta-customer.outputs.labels }}

      - name: Docker metadata (bank-dashboard)
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.image_prefix }}/bank-dashboard
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push bank-dashboard
        uses: docker/build-push-action@v6
        with:
          context: ./bank-dashboard
          push: true
          provenance: false
          sbom: false
          build-args: |
            NEXT_PUBLIC_USERS_API_URL=https://users-api.dental-care.me
            NEXT_PUBLIC_CORE_API_URL=https://core-api.dental-care.me
            NEXT_PUBLIC_CUSTOMER_API_URL=https://customer-api.dental-care.me
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}

      - name: Docker metadata (user-dashboard)
        id: meta-user-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.image_prefix }}/user-dashboard
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push user-dashboard
        uses: docker/build-push-action@v6
        with:
          context: ./user-dashboard
          push: true
          provenance: false
          sbom: false
          build-args: |
            NEXT_PUBLIC_CUSTOMER_API_URL=https://customer-api.dental-care.me
            NEXT_PUBLIC_CORE_API_URL=https://core-api.dental-care.me
          tags: ${{ steps.meta-user-dashboard.outputs.tags }}
          labels: ${{ steps.meta-user-dashboard.outputs.labels }}

  # Runs on a self-hosted runner installed on the same server as k3s.
  # No KUBE_CONFIG secret or Cloudflare tunnel needed.
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig from k3s
        run: |
          mkdir -p ~/.kube
          if [ -f ~/.kube/config ]; then
            echo "Using existing ~/.kube/config"
          elif [ -r /etc/rancher/k3s/k3s.yaml ]; then
            cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
          else
            echo "::error::~/.kube/config missing and cannot read /etc/rancher/k3s/k3s.yaml."
            echo "On the runner host, run once (replace USER with the runner service user):"
            echo "  sudo mkdir -p /home/USER/.kube"
            echo "  sudo cp /etc/rancher/k3s/k3s.yaml /home/USER/.kube/config"
            echo "  sudo chown USER:USER /home/USER/.kube/config"
            echo "  sudo chmod 600 /home/USER/.kube/config"
            exit 1
          fi
          chmod 600 ~/.kube/config

      - name: Patch prod overlay images
        run: |
          IMAGE_PREFIX="${{ needs.build-and-push.outputs.image_prefix }}"
          cd k8s/overlays/prod
          kustomize edit set image \
            ghcr.io/example/my-bank/core-banking=${IMAGE_PREFIX}/core-banking:latest \
            ghcr.io/example/my-bank/bank-user=${IMAGE_PREFIX}/bank-user:latest \
            ghcr.io/example/my-bank/c-user=${IMAGE_PREFIX}/c-user:latest \
            ghcr.io/example/my-bank/bank-dashboard=${IMAGE_PREFIX}/bank-dashboard:latest \
            ghcr.io/example/my-bank/user-dashboard=${IMAGE_PREFIX}/user-dashboard:latest

      - name: Deploy Kubernetes Dashboard
        run: kubectl apply -k k8s/addons/dashboard

      - name: Deploy to cluster
        run: kubectl apply -k k8s/overlays/prod

      - name: Restart deployments to pull latest images
        run: |
          kubectl rollout restart deployment/core-banking deployment/bank-user deployment/c-user deployment/bank-dashboard deployment/user-dashboard -n my-bank

      - name: Wait for rollouts
        env:
          ROLLOUT_TIMEOUT: 900s
        run: |
          # Slow networks: image pulls (~70MB each) can take several minutes per pod.
          kubectl rollout status deployment/core-banking -n my-bank --timeout="$ROLLOUT_TIMEOUT"
          kubectl rollout status deployment/bank-user -n my-bank --timeout="$ROLLOUT_TIMEOUT"
          kubectl rollout status deployment/c-user -n my-bank --timeout="$ROLLOUT_TIMEOUT"
          kubectl rollout status deployment/bank-dashboard -n my-bank --timeout="$ROLLOUT_TIMEOUT"
          kubectl rollout status deployment/user-dashboard -n my-bank --timeout="$ROLLOUT_TIMEOUT"

      - name: Debug failed rollout
        if: failure()
        run: |
          kubectl get pods -n my-bank -o wide
          kubectl describe deployment core-banking -n my-bank | tail -40
          kubectl describe deployment bank-user -n my-bank | tail -40
          for p in $(kubectl get pods -n my-bank -o name); do
            echo "=== $p ==="
            kubectl describe -n my-bank "$p" | tail -25
            kubectl logs -n my-bank "$p" --tail=50 || true
          done
