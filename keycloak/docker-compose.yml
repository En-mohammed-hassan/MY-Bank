# Keycloak only — platform IdP for MY-Bank (same pattern as apim/wso2/).
# Does NOT include app databases or microservices (those live in k8s/).
services:
  keycloak:
    # Docker Hub mirror — use if quay.io returns 403 (network/firewall)
    image: keycloak/keycloak:26.0
    container_name: bank-keycloak
    command: start-dev
    restart: unless-stopped
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8080}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost:8080}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS:-}
      KC_HTTP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
