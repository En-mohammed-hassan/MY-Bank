services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
      POSTGRES_DB: bank_users
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank_users"]
      interval: 5s
      timeout: 5s
      retries: 5

  bank-user-service:
    build: .
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://bank:bank@postgres:5432/bank_users
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://host.docker.internal:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-bank}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-bank-user-service}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-change-me}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:-http://host.docker.internal:8080/realms/bank/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-bank-api}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
