apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Override image registry/org for your GitHub account or private registry.
images:
  - name: ghcr.io/example/my-bank/core-banking
    newName: ghcr.io/en-mohammed-hassan/my-bank/core-banking
    newTag: latest
  - name: ghcr.io/example/my-bank/bank-user
    newName: ghcr.io/en-mohammed-hassan/my-bank/bank-user
    newTag: latest
  - name: ghcr.io/example/my-bank/c-user
    newName: ghcr.io/en-mohammed-hassan/my-bank/c-user
    newTag: latest
  - name: ghcr.io/example/my-bank/bank-dashboard
    newName: ghcr.io/en-mohammed-hassan/my-bank/bank-dashboard
    newTag: latest
  - name: ghcr.io/example/my-bank/user-dashboard
    newName: ghcr.io/en-mohammed-hassan/my-bank/user-dashboard
    newTag: latest

patches:
  - path: patch-replicas.yaml
