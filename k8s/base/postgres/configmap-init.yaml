apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: my-bank
data:
  01-create-databases.sh: |
    #!/bin/bash
    set -euo pipefail
    psql -v ON_ERROR_STOP=1 --username "${POSTGRES_USER}" --dbname "${POSTGRES_DB}" <<-EOSQL
      CREATE DATABASE core_banking;
      CREATE DATABASE bank_users;
      CREATE DATABASE bank_customers;
    EOSQL
