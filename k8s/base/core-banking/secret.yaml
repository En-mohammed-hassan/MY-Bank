# DATABASE_URL is built from postgres-credentials at deploy time, or set manually:
# postgresql+psycopg2://bank:PASSWORD@postgres:5432/core_banking
apiVersion: v1
kind: Secret
metadata:
  name: core-banking-db
  labels:
    app.kubernetes.io/name: core-banking
    app.kubernetes.io/part-of: my-bank
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg2://bank:change-me-in-production@postgres:5432/core_banking
