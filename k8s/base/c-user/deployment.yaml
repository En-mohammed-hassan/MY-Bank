apiVersion: apps/v1
kind: Deployment
metadata:
  name: c-user
  labels:
    app.kubernetes.io/name: c-user
    app.kubernetes.io/part-of: my-bank
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: c-user
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c-user
        app.kubernetes.io/part-of: my-bank
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          envFrom:
            - secretRef:
                name: postgres-credentials
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U "$POSTGRES_USER" -d postgres; do
                echo "waiting for postgres..."
                sleep 2
              done
        - name: ensure-bank-customers-db
          image: postgres:16
          envFrom:
            - secretRef:
                name: postgres-credentials
          command:
            - sh
            - -c
            - |
              export PGPASSWORD="$POSTGRES_PASSWORD"

              if psql -h postgres -U "$POSTGRES_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'bank_customers'" | grep -q 1; then
                echo "database bank_customers already exists"
              else
                echo "creating database bank_customers"
                if psql -h postgres -U "$POSTGRES_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE bank_customers"; then
                  echo "database bank_customers created"
                elif psql -h postgres -U "$POSTGRES_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'bank_customers'" | grep -q 1; then
                  echo "database bank_customers was created concurrently"
                else
                  exit 1
                fi
              fi
      containers:
        - name: c-user
          image: ghcr.io/example/my-bank/c-user:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: c-user-db
            - secretRef:
                name: c-user-keycloak
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
