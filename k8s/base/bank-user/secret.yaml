apiVersion: v1
kind: Secret
metadata:
  name: bank-user-db
  labels:
    app.kubernetes.io/name: bank-user
    app.kubernetes.io/part-of: my-bank
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg2://bank:change-me-in-production@postgres:5432/bank_users
---
# Point these at Keycloak running on your server (outside or inside the cluster).
apiVersion: v1
kind: Secret
metadata:
  name: bank-user-keycloak
  labels:
    app.kubernetes.io/name: bank-user
    app.kubernetes.io/part-of: my-bank
type: Opaque
stringData:
  KEYCLOAK_SERVER_URL: https://auth.example.com
  KEYCLOAK_REALM: bank
  KEYCLOAK_ADMIN_CLIENT_ID: bank-user-service
  KEYCLOAK_ADMIN_CLIENT_SECRET: change-me
  KEYCLOAK_JWKS_URL: https://auth.example.com/realms/bank/protocol/openid-connect/certs
  KEYCLOAK_AUDIENCE: bank-api
