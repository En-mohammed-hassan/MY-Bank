apiVersion: v1
kind: Secret
metadata:
  name: bank-user-db
  labels:
    app.kubernetes.io/name: bank-user
    app.kubernetes.io/part-of: my-bank
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg2://bank:change-me-in-production@postgres:5432/bank_users
---
# Point these at Keycloak running on your server (outside or inside the cluster).
apiVersion: v1
kind: Secret
metadata:
  name: bank-user-keycloak
  labels:
    app.kubernetes.io/name: bank-user
    app.kubernetes.io/part-of: my-bank
type: Opaque
stringData:
  KEYCLOAK_SERVER_URL: https://auth.dental-care.me
  # Docker on same host as k3s — use bridge gateway (host.k3s.internal may not resolve)
  KEYCLOAK_INTERNAL_URL: http://172.17.0.1:8080
  KEYCLOAK_REALM: bank
  KEYCLOAK_ADMIN_CLIENT_ID: bank-user-service
  KEYCLOAK_ADMIN_CLIENT_SECRET: change-me-in-keycloak-credentials-tab
  KEYCLOAK_PUBLIC_CLIENT_ID: bank-web
  KEYCLOAK_JWKS_URL: https://auth.dental-care.me/realms/bank/protocol/openid-connect/certs
