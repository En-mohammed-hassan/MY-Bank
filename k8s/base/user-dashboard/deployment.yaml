apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-dashboard
  labels:
    app.kubernetes.io/name: user-dashboard
    app.kubernetes.io/part-of: my-bank
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-dashboard
        app.kubernetes.io/part-of: my-bank
    spec:
      containers:
        - name: user-dashboard
          image: ghcr.io/example/my-bank/user-dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
