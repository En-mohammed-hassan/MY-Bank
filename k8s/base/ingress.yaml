apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-bank
  labels:
    app.kubernetes.io/part-of: my-bank
  annotations:
    # Uncomment for cert-manager TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: core.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-banking
                port:
                  name: http
    - host: users.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bank-user
                port:
                  name: http
  # tls:
  #   - hosts:
  #       - core.example.com
  #       - users.example.com
  #     secretName: my-bank-tls
