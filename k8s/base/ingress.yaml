apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-bank
  labels:
    app.kubernetes.io/part-of: my-bank
  annotations:
    # Uncomment for cert-manager TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # Public clients should use WSO2 APIM at api.dental-care.me (see apim/README.md).
    # These hostnames are backend targets for the gateway and optional direct debugging.
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "false"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
spec:
  ingressClassName: nginx
  rules:
    - host: core-api.dental-care.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-banking
                port:
                  name: http
    - host: users-api.dental-care.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bank-user
                port:
                  name: http
    - host: customer-api.dental-care.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: c-user
                port:
                  name: http
    - host: dashboard.dental-care.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bank-dashboard
                port:
                  name: http
    - host: user-dashboard.dental-care.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: user-dashboard
                port:
                  name: http
  # tls:
  #   - hosts:
  #       - core-api.dental-care.me
  #       - users-api.dental-care.me
  #     secretName: my-bank-tls
