apiVersion: v1
kind: Secret
metadata:
  name: customer-service-db
  labels:
    app.kubernetes.io/name: customer-service
    app.kubernetes.io/part-of: my-bank
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg2://bank:change-me-in-production@postgres:5432/bank_customers
