# MY-Bank WSO2 API Manager 4.5.0 — single-node dev config
# Uses embedded H2 (default). For production, switch to shared MySQL/PostgreSQL.
#
# Change [server].hostname and gateway endpoints to api.dental-care.me for prod.

[server]
hostname = "localhost"
server_role = "default"

[user_store]
type = "database_unique_id"

[super_admin]
username = "admin"
password = "admin"
create_admin_account = true

[database.apim_db]
type = "h2"
url = "jdbc:h2:./repository/database/WSO2AM_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"

[database.shared_db]
type = "h2"
url = "jdbc:h2:./repository/database/WSO2SHARED_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"

[apim.gateway]
environment = ["Default"]

[[apim.gateway.environment]]
name = "Default"
type = "hybrid"
display_in_api_console = true
description = "MY-Bank API gateway (local Docker)"
show_as_token_endpoint_url = true
service_url = "https://localhost:9443/services/"
username = "admin"
password = "admin"
ws_endpoint = "ws://localhost:9099"
wss_endpoint = "wss://localhost:8099"
http_endpoint = "http://localhost:8280"
https_endpoint = "https://localhost:8243"

[apim.cors]
enable = true
allow_origins = ["*"]
allow_methods = ["GET", "PUT", "POST", "DELETE", "PATCH", "OPTIONS"]
allow_headers = ["authorization", "Access-Control-Allow-Origin", "Content-Type", "SOAPAction", "apikey", "Internal-Key"]
allow_credentials = false

# Production example (uncomment and replace localhost):
# [server]
# hostname = "api.dental-care.me"
#
# [[apim.gateway.environment]]
# http_endpoint = "http://api.dental-care.me:8280"
# https_endpoint = "https://api.dental-care.me:8243"
# service_url = "https://api.dental-care.me:9443/services/"
