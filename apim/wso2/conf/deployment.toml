# MY-Bank WSO2 API Manager 4.5.0 — production (Cloudflare Tunnel)
# Uses embedded H2 (default). For hardened prod, switch to shared MySQL/PostgreSQL.
#
# Tunnel: api.dental-care.me → :8280 (gateway), apim.dental-care.me → :8090→9443 (publisher)
# server.hostname = Publisher/OAuth; gateway endpoints stay on api.dental-care.me below.

[server]
hostname = "apim.dental-care.me"
server_role = "default"

[user_store]
type = "database_unique_id"

[super_admin]
username = "admin"
password = "admin"
create_admin_account = true

[database.apim_db]
type = "h2"
url = "jdbc:h2:./repository/database/WSO2AM_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"

[database.shared_db]
type = "h2"
url = "jdbc:h2:./repository/database/WSO2SHARED_DB;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"

[[apim.gateway.environment]]
name = "Default"
type = "hybrid"
display_in_api_console = true
description = "MY-Bank API gateway (api.dental-care.me)"
show_as_token_endpoint_url = true
service_url = "https://apim.dental-care.me/services/"
username = "admin"
password = "admin"
ws_endpoint = "ws://api.dental-care.me:9099"
wss_endpoint = "wss://api.dental-care.me:8099"
http_endpoint = "http://api.dental-care.me"
https_endpoint = "https://api.dental-care.me"

[apim.cors]
enable = true
allow_origins = ["*"]
allow_methods = ["GET", "PUT", "POST", "DELETE", "PATCH", "OPTIONS"]
allow_headers = ["authorization", "Access-Control-Allow-Origin", "Content-Type", "SOAPAction", "apikey", "Internal-Key"]
allow_credentials = false

# Cloudflare terminates TLS on :443 — WSO2 must trust X-Forwarded-* from the tunnel.
[transport.https.properties]
proxyPort = 443

# Forward the client's Bearer token to backends after gateway OAuth validation.
# Without this, bank-user/core-banking receive no Authorization header and return 401.
[apim.oauth_config]
enable_outbound_auth_header = true
