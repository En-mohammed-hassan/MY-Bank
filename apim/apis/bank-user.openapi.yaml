openapi: 3.0.3
info:
  title: MY-Bank Bank User API
  description: Bank staff management and auth BFF (proxies Keycloak login).
  version: 1.0.0
servers:
  - url: https://localhost:8243/bank-user/1.0.0
    description: Local WSO2 gateway (HTTPS)
  - url: https://api.dental-care.me/bank-user/1.0.0
    description: Production gateway
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Service health
      tags: [health]
      responses:
        "200":
          description: OK
  /auth/login:
    post:
      operationId: login
      summary: Login via Keycloak (password grant proxy)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Token response
  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token response
  /auth/logout:
    post:
      operationId: logout
      summary: Logout / invalidate refresh token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Logged out
  /bank-users:
    get:
      operationId: listBankUsers
      summary: List staff profiles
      tags: [bank-users]
      security:
        - oauth2: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Staff list
    post:
      operationId: createBankUser
      summary: Create staff user (Keycloak + DB)
      tags: [bank-users]
      security:
        - oauth2: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, full_name, role, temporary_password]
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                full_name:
                  type: string
                role:
                  type: string
                department:
                  type: string
                temporary_password:
                  type: string
      responses:
        "201":
          description: Created
  /bank-users/{user_id}:
    get:
      operationId: getBankUser
      summary: Get staff profile by ID
      tags: [bank-users]
      security:
        - oauth2: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Staff profile
    delete:
      operationId: deleteBankUser
      summary: Hard delete staff (platform_admin only)
      tags: [bank-users]
      security:
        - oauth2: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
  /bank-users/{user_id}/role:
    patch:
      operationId: updateBankUserRole
      summary: Update staff role
      tags: [bank-users]
      security:
        - oauth2: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
      responses:
        "200":
          description: Updated
  /bank-users/{user_id}/status:
    patch:
      operationId: updateBankUserStatus
      summary: Enable or disable staff
      tags: [bank-users]
      security:
        - oauth2: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, disabled]
      responses:
        "200":
          description: Updated
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        password:
          tokenUrl: https://auth.dental-care.me/realms/bank/protocol/openid-connect/token
          scopes: {}
        clientCredentials:
          tokenUrl: https://auth.dental-care.me/realms/bank/protocol/openid-connect/token
          scopes: {}
