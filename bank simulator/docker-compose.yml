services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: core
      POSTGRES_PASSWORD: core
      POSTGRES_DB: core_banking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core -d core_banking"]
      interval: 5s
      timeout: 5s
      retries: 5

  core-banking-simulator:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://core:core@postgres:5432/core_banking
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
